name: Auto-Generate on Merge

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - 'agents/**'
      - 'instructions/**'
      - 'skills/**'
      - 'hooks/**'
      - 'solution-plays/**/fai-manifest.json'

permissions:
  contents: write

concurrency:
  group: auto-generate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regenerate:
    name: Regenerate Marketplace & Sync
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - name: Regenerate marketplace.json
        run: node scripts/generate-marketplace.js

      - name: Run content sync (auto-fixes counts + versions)
        run: node scripts/sync-content.js

      - name: Commit all synced changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-regenerate marketplace + sync content [skip ci]"
            git push
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Auto-Generate" >> $GITHUB_STEP_SUMMARY
          echo "✅ Marketplace + content sync completed" >> $GITHUB_STEP_SUMMARY
