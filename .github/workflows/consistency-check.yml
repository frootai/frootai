name: Consistency Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: consistency-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - name: Run content sync (auto-fix)
        run: node scripts/sync-content.js

      - name: Check if sync made changes
        id: check_changes
        run: |
          if [ -n "$(git diff --name-only)" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Files changed by sync:"
            git diff --name-only
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "All files already consistent"
          fi

      - name: Auto-commit sync fixes
        if: steps.check_changes.outputs.changes == 'true' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(auto): sync versions + counts across ecosystem [skip ci]"
          git push

      - name: Validate consistency
        run: node scripts/validate-consistency.js

      - name: Summary
        if: always()
        run: |
          echo "## Consistency Check" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Sync needed | ${{ steps.check_changes.outputs.changes }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Validation | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
