name: Deploy Agent FAI Chatbot

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-chatbot-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HAS_AZURE_SECRET: ${{ secrets.AZURE_CHATBOT_PUBLISH_PROFILE }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: functions
        run: npm install --omit=dev

      - name: Create deployment package
        run: |
          cp config/agent-fai-prompt.js functions/agent-fai-prompt.js
          cd functions
          zip -r ../deploy.zip . -x "node_modules/.cache/*"

      - name: Deploy to Azure App Service
        if: env.HAS_AZURE_SECRET != ''
        uses: azure/webapps-deploy@2fdd5c3ebb4b4b416744f0eafaec3ae24b4d0920 # v3.0.2
        with:
          app-name: frootai-chatbot-api
          package: deploy.zip
          publish-profile: ${{ secrets.AZURE_CHATBOT_PUBLISH_PROFILE }}

      - name: Skip deploy (no secret configured)
        if: env.HAS_AZURE_SECRET == ''
        run: echo "⚠️ Skipping Azure deploy — AZURE_CHATBOT_PUBLISH_PROFILE secret not configured. Add it in repo Settings → Secrets."

      - name: Summary
        if: always()
        run: |
          echo "## Chatbot Deploy" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| App | frootai-chatbot-api |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
