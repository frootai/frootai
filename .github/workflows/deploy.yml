name: Deploy FrootAI to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install website dependencies
        working-directory: website
        run: npm install

      - name: Build website
        working-directory: website
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Lighthouse CI audit
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:8080/
            http://localhost:8080/setup-guide
            http://localhost:8080/cli
          uploadArtifacts: true
          configPath: ./website/.lighthouserc.json
          temporaryPublicStorage: true
        continue-on-error: true

      - name: Verify search index
        working-directory: website
        run: |
          if [ -f build/search-index.json ]; then
            ENTRIES=$(node -e "console.log(JSON.parse(require('fs').readFileSync('build/search-index.json','utf8')).length)")
            echo "✅ Search index: $ENTRIES entries"
          else
            echo "ℹ️  No search-index.json (search plugin may bundle differently)"
          fi

      - name: Verify MCP server
        working-directory: mcp-server
        run: |
          npm install
          echo "=== FrootAI MCP Server Verification ==="
          node -e "
            import { readFileSync } from 'fs';
            const kb = JSON.parse(readFileSync('knowledge.json', 'utf-8'));
            const count = Object.keys(kb.modules).length;
            console.log('  Knowledge base: ' + count + ' modules bundled');
            console.log('  Bundle size: ' + (Buffer.byteLength(readFileSync('knowledge.json')) / 1024).toFixed(0) + ' KB');
            console.log('✅ MCP server verified');
          "

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
