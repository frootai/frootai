name: Deploy FrootAI to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install website dependencies
        working-directory: website-v6
        run: npm install

      - name: Build search index
        working-directory: website-v6
        run: node scripts/build-search-index.js

      - name: Build website
        working-directory: website-v6
        run: npx next build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Verify build output
        working-directory: website-v6
        run: |
          PAGES=$(find out -name "*.html" | wc -l)
          echo "✅ Static export: $PAGES HTML files"
          ls -la out/CNAME out/.nojekyll 2>/dev/null || echo "ℹ️  CNAME/.nojekyll check"
          if [ -f out/search-index.json ]; then
            ENTRIES=$(node -e "console.log(JSON.parse(require('fs').readFileSync('out/search-index.json','utf8')).length)")
            echo "✅ Search index: $ENTRIES entries"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website-v6/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  lighthouse:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Run Lighthouse audit
        run: |
          lhci autorun \
            --collect.url="https://frootai.dev" \
            --collect.url="https://frootai.dev/docs/architecture-overview" \
            --collect.numberOfRuns=1 \
            --assert.preset=lighthouse:no-pwa \
            --assert.assertions.categories:performance=off \
            --assert.assertions.categories:accessibility="warn" \
            --assert.assertions.categories:best-practices="warn" \
            --assert.assertions.categories:seo="warn" \
            --upload.target=temporary-public-storage || true
        env:
          LHCI_GITHUB_APP_TOKEN: ""
