name: FAI Factory Pipeline

on:
  pull_request:
    branches: [main]
    paths:
      - 'agents/**'
      - 'instructions/**'
      - 'skills/**'
      - 'hooks/**'
      - 'plugins/**'
      - 'workflows/**'
      - 'cookbook/**'
      - 'solution-plays/**'
      - 'marketplace.json'
      - 'scripts/factory/**'
  push:
    branches: [main]
    paths:
      - 'agents/**'
      - 'instructions/**'
      - 'skills/**'
      - 'hooks/**'
      - 'plugins/**'
      - 'workflows/**'
      - 'cookbook/**'
      - 'solution-plays/**'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: factory-${{ github.ref }}
  cancel-in-progress: true

jobs:
  factory:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      # Run full factory pipeline: harvest → catalog → validate
      - name: Run FAI Factory — Harvest
        run: node scripts/factory/harvest.js

      - name: Run FAI Factory — Catalog
        run: node scripts/factory/catalog.js

      - name: Run FAI Factory — Validate
        run: node scripts/factory/validate.js

      # Compare with baseline if available
      - name: Run FAI Factory — Diff
        if: github.event_name == 'pull_request'
        run: |
          # Save current catalog
          cp .factory/fai-catalog.json .factory/fai-catalog-pr.json

          # Checkout base branch, build baseline catalog
          git checkout ${{ github.event.pull_request.base.sha }} -- agents/ instructions/ skills/ hooks/ plugins/ workflows/ cookbook/ solution-plays/ 2>/dev/null || true
          node scripts/factory/harvest.js --quiet 2>/dev/null || true
          node scripts/factory/catalog.js --quiet 2>/dev/null || true

          if [ -f .factory/fai-catalog.json ]; then
            cp .factory/fai-catalog.json .factory/fai-catalog-base.json
            # Restore PR catalog
            cp .factory/fai-catalog-pr.json .factory/fai-catalog.json
            node scripts/factory/diff.js .factory/fai-catalog-base.json .factory/fai-catalog.json > .factory/diff-output.txt 2>&1 || true
          fi

          # Restore working tree
          git checkout ${{ github.sha }} -- . 2>/dev/null || true

      # Post diff as PR comment
      - name: Post Factory Diff to PR
        if: github.event_name == 'pull_request' && hashFiles('.factory/diff-output.txt') != ''
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('fs');
            let diff = '';
            try {
              diff = fs.readFileSync('.factory/diff-output.txt', 'utf8').trim();
            } catch { diff = 'No diff output available.'; }

            // Truncate if too long for a PR comment
            if (diff.length > 60000) {
              diff = diff.substring(0, 60000) + '\n\n... (truncated)';
            }

            const body = `## 🏭 FAI Factory Diff

            <details>
            <summary>Primitive changes detected</summary>

            \`\`\`
            ${diff}
            \`\`\`
            </details>

            *Generated by FAI Factory Pipeline*`;

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('FAI Factory Diff'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      # Upload catalog as artifact
      - name: Upload Factory Catalog
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: fai-catalog
          path: .factory/fai-catalog.json
          retention-days: 30

  # Trigger website rebuild on push to main
  notify-website:
    needs: factory
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger website rebuild
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          github-token: ${{ secrets.CROSS_REPO_TOKEN }}
          script: |
            try {
              await github.rest.repos.createDispatchEvent({
                owner: 'frootai',
                repo: 'frootai.dev',
                event_type: 'factory-update',
                client_payload: {
                  commit: context.sha,
                  message: context.payload.head_commit?.message || 'Factory update',
                },
              });
              console.log('✅ Dispatched website rebuild');
            } catch (err) {
              console.log('⚠️ Cross-repo dispatch failed (expected if CROSS_REPO_TOKEN not set):', err.message);
            }
