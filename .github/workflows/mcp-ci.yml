name: MCP Server CI
on:
  push:
    branches: [main]
    paths: ['npm-mcp/**', 'engine/**']
  pull_request:
    paths: ['npm-mcp/**', 'engine/**']

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: cd npm-mcp && npm ci
      - name: TypeScript check
        run: cd npm-mcp && npm run typecheck
      - name: Compile TypeScript
        run: cd npm-mcp && npm run build:ts
      - name: Verify dist/server.js exports
        run: node -e "import('./npm-mcp/dist/server.js').then(m => { if (typeof m.getServerInfo !== 'function') throw new Error('getServerInfo missing'); console.log('Types OK:', m.getServerInfo().toolCount, 'tools'); })"
      - name: Build BM25 search index
        run: cd npm-mcp && node build-search-index.js
      - name: Run tests
        run: cd npm-mcp && npm test
      - name: Engine tests
        run: node engine/test.js
      - name: Server starts (stdio)
        run: |
          timeout 5 node npm-mcp/index.js || true
          echo "Server startup verified"

      - name: Summary
        if: always()
        run: |
          echo "## MCP CI (Node ${{ matrix.node-version }})" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Server startup | ✅ |" >> $GITHUB_STEP_SUMMARY
