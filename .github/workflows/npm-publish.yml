name: Publish MCP Server to npm

on:
  push:
    tags:
      - 'mcp-v*'    # Channel-specific: mcp-v5.0.2
      - 'rel-v*'    # Unified release: rel-v2025.04.09 triggers ALL channels
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Check if version is newer than npm
        id: version_check
        working-directory: mcp-server
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          NPM=$(npm view frootai-mcp version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL" >> $GITHUB_OUTPUT
          echo "npm=$NPM" >> $GITHUB_OUTPUT
          if [ "$LOCAL" = "$NPM" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version $LOCAL already published — skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Publishing frootai-mcp@$LOCAL (npm has $NPM)"
          fi

      - name: Publish to npm
        if: steps.version_check.outputs.skip != 'true'
        working-directory: mcp-server
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish notification
        if: success()
        run: |
          PKG_VERSION=$(node -p "require('./mcp-server/package.json').version")
          echo "::notice::✅ frootai-mcp@${PKG_VERSION} published to npm successfully!"
          echo "📦 Package: https://www.npmjs.com/package/frootai-mcp/v/${PKG_VERSION}"

      - name: Summary
        if: always()
        run: |
          echo "## npm Publish" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Package | frootai-mcp |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ steps.version_check.outputs.local }} |" >> $GITHUB_STEP_SUMMARY
          echo "| npm Version | ${{ steps.version_check.outputs.npm }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Skipped | ${{ steps.version_check.outputs.skip }} |" >> $GITHUB_STEP_SUMMARY
