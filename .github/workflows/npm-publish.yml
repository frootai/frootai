name: Publish to npm (frootai-mcp + frootai)

on:
  push:
    tags:
      - 'mcp-v*'    # Channel-specific: mcp-v5.2.0
      - 'cli-v*'    # CLI-specific: cli-v5.2.0
      - 'rel-v*'    # Unified release: rel-v2025.04.09 triggers ALL channels
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-mcp:
    name: Publish frootai-mcp
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Check if version is newer than npm
        id: version_check
        working-directory: npm-mcp
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          NPM=$(npm view frootai-mcp version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL" >> $GITHUB_OUTPUT
          echo "npm=$NPM" >> $GITHUB_OUTPUT
          if [ "$LOCAL" = "$NPM" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version $LOCAL already published — skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Publishing frootai-mcp@$LOCAL (npm has $NPM)"
          fi

      - name: Publish frootai-mcp to npm
        if: steps.version_check.outputs.skip != 'true'
        working-directory: npm-mcp
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        if: always()
        run: |
          echo "## frootai-mcp" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ steps.version_check.outputs.local }} |" >> $GITHUB_STEP_SUMMARY
          echo "| npm | ${{ steps.version_check.outputs.npm }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ steps.version_check.outputs.skip == 'true' && 'Skipped' || 'Published' }} |" >> $GITHUB_STEP_SUMMARY

  publish-cli:
    name: Publish frootai (CLI)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: publish-mcp
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Check if version is newer than npm
        id: cli_check
        working-directory: npm-sdk
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          NPM=$(npm view frootai version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL" >> $GITHUB_OUTPUT
          echo "npm=$NPM" >> $GITHUB_OUTPUT
          if [ "$LOCAL" = "$NPM" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "frootai@$LOCAL already published — skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Publishing frootai@$LOCAL (npm has $NPM)"
          fi

      - name: Publish frootai to npm
        if: steps.cli_check.outputs.skip != 'true'
        working-directory: npm-sdk
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        if: always()
        run: |
          echo "## frootai (CLI)" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ steps.cli_check.outputs.local }} |" >> $GITHUB_STEP_SUMMARY
          echo "| npm | ${{ steps.cli_check.outputs.npm }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ steps.cli_check.outputs.skip == 'true' && 'Skipped' || 'Published' }} |" >> $GITHUB_STEP_SUMMARY
