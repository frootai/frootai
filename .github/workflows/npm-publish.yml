name: Publish to npm (frootai-mcp + frootai)

on:
  push:
    tags:
      - 'mcp-v*'    # Channel-specific: mcp-v5.0.2
      - 'rel-v*'    # Unified release: rel-v2025.04.09 triggers ALL channels
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Check if version is newer than npm
        id: version_check
        working-directory: mcp-server
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          NPM=$(npm view frootai-mcp version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL" >> $GITHUB_OUTPUT
          echo "npm=$NPM" >> $GITHUB_OUTPUT
          if [ "$LOCAL" = "$NPM" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version $LOCAL already published — skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Publishing frootai-mcp@$LOCAL (npm has $NPM)"
          fi

      - name: Publish to npm
        if: steps.version_check.outputs.skip != 'true'
        working-directory: mcp-server
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Sync frootai alias version
        run: |
          LOCAL=${{ steps.version_check.outputs.local }}
          cd cli
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = '${LOCAL}';
            pkg.dependencies['frootai-mcp'] = '^${LOCAL}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "frootai alias synced to v${LOCAL}"

      - name: Publish frootai alias to npm
        working-directory: cli
        run: |
          ALIAS_NPM=$(npm view frootai version 2>/dev/null || echo "0.0.0")
          ALIAS_LOCAL=$(node -p "require('./package.json').version")
          if [ "$ALIAS_LOCAL" != "$ALIAS_NPM" ]; then
            npm publish --access public
            echo "::notice::✅ frootai@${ALIAS_LOCAL} published!"
          else
            echo "frootai@${ALIAS_LOCAL} already published — skipping."
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        if: always()
        run: |
          echo "## npm Publish" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Version | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| frootai-mcp | ${{ steps.version_check.outputs.local }} | ${{ steps.version_check.outputs.skip == 'true' && 'Skipped' || 'Published' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| frootai | ${{ steps.version_check.outputs.local }} | Alias synced |" >> $GITHUB_STEP_SUMMARY
