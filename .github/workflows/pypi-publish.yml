name: Publish Python Packages to PyPI

on:
  push:
    tags:
      - 'sdk-v*'     # Python SDK only: sdk-v5.0.2
      - 'pymcp-v*'   # Python MCP only: pymcp-v5.0.2
      - 'rel-v*'     # Unified release: triggers ALL channels
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-mcp:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # On tag push: always publish. On branch push: only if python-mcp changed.
    # Always run on tag push or manual dispatch
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Install build tools
        run: pip install build twine
      - name: Build frootai-mcp
        working-directory: python-mcp
        run: python -m build
      - name: Publish to PyPI
        working-directory: python-mcp
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/* --skip-existing

      - name: Summary
        if: always()
        run: |
          echo "## PyPI Publish" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| frootai-mcp | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| frootai SDK | (see publish-sdk job) |" >> $GITHUB_STEP_SUMMARY
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # On tag push: always publish. On branch push: only if python-sdk changed.
    # Always run on tag push or manual dispatch
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Install build tools
        run: pip install build twine
      - name: Build frootai SDK
        working-directory: python-sdk
        run: python -m build
      - name: Publish to PyPI
        working-directory: python-sdk
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/* --skip-existing
