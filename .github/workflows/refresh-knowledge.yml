name: Refresh Knowledge & BM25 Index

on:
  schedule:
    # Run every Sunday at 3:00 AM UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if knowledge.json is current'
        required: false
        default: 'false'

jobs:
  refresh:
    name: Rebuild knowledge.json + search-index.json
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install MCP server dependencies
        run: cd mcp-server && npm ci

      - name: Rebuild knowledge.json
        run: |
          cd mcp-server
          node build-knowledge.js
          echo "knowledge.json size: $(wc -c < knowledge.json) bytes"

      - name: Rebuild BM25 search index
        run: |
          cd mcp-server
          node build-search-index.js
          echo "search-index.json size: $(wc -c < search-index.json) bytes"

      - name: TypeScript check (post-rebuild)
        run: cd mcp-server && npm run typecheck

      - name: Compile TypeScript
        run: cd mcp-server && npm run build:ts

      - name: Run vitest tests
        run: cd mcp-server && npm test

      - name: Check for changes
        id: changes
        run: |
          git diff --name-only mcp-server/knowledge.json mcp-server/search-index.json || true
          if git diff --quiet mcp-server/knowledge.json mcp-server/search-index.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to knowledge files."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Knowledge files updated."
          fi

      - name: Commit updated knowledge files
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mcp-server/knowledge.json mcp-server/search-index.json
          git commit -m "chore(mcp): auto-refresh knowledge.json + BM25 index [skip ci]

          Weekly knowledge rebuild triggered by schedule.
          
          Co-authored-by: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          git push

      - name: Summary
        run: |
          echo "## Knowledge Refresh Summary" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| knowledge.json | $(du -sh mcp-server/knowledge.json | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          echo "| search-index.json | $(du -sh mcp-server/search-index.json | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          echo "| Changed | ${{ steps.changes.outputs.changed }} |" >> $GITHUB_STEP_SUMMARY
