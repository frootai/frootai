name: Sync README Validation

on:
  pull_request:
    branches: [main]
    paths:
      - '**/README.md'
      - 'mcp-server/package.json'
      - 'mcp-server/index.js'
      - 'vscode-extension/package.json'
  push:
    branches: [main]
    paths:
      - '**/README.md'

concurrency:
  group: sync-readme-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-readmes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - name: Check README consistency across key files
        run: |
          node -e "
          const fs = require('fs');

          const mcpPkg = JSON.parse(fs.readFileSync('mcp-server/package.json', 'utf8'));
          const mcpVersion = mcpPkg.version;
          const mcpIndex = fs.readFileSync('mcp-server/index.js', 'utf8');
          const toolCount = (mcpIndex.match(/server\\.tool\\(/g) || []).length;

          const readmes = [
            'README.md',
            'mcp-server/README.md',
            'vscode-extension/README.md',
            'docs/README.md',
            'solution-plays/README.md'
          ];

          let errors = 0;
          let warnings = 0;

          for (const readme of readmes) {
            if (!fs.existsSync(readme)) continue;
            const content = fs.readFileSync(readme, 'utf8');

            // Check for stale version references (warning, not error)
            const versionRefs = content.match(/frootai-mcp@(\d+\.\d+\.\d+)/g) || [];
            for (const ref of versionRefs) {
              const v = ref.split('@')[1];
              if (v !== mcpVersion) {
                console.warn('::warning file=' + readme + '::Stale version: ' + ref + ' (current: @' + mcpVersion + ')');
                warnings++;
              }
            }

            // Check for wrong tool counts (warning, not error)
            const toolRefs = content.match(/(\d+)\s+tools/g) || [];
            for (const ref of toolRefs) {
              const n = parseInt(ref);
              if (n > 10 && n !== toolCount) {
                console.warn('::warning file=' + readme + '::Tool count mismatch: ' + ref + ' (actual: ' + toolCount + ' tools)');
                warnings++;
              }
            }
          }

          if (warnings > 0) {
            console.log('');
            console.log('⚠️ ' + warnings + ' README inconsistencies found (non-blocking).');
            console.log('Fix: node scripts/sync-content.js');
          }

          console.log('✅ README validation complete (' + readmes.filter(r => fs.existsSync(r)).length + ' files checked, ' + toolCount + ' tools, v' + mcpVersion + ')');
          "
      - name: Summary
        if: always()
        run: |
          echo \"## README Sync\" >> $GITHUB_STEP_SUMMARY
          echo \"✅ README consistency validated\" >> $GITHUB_STEP_SUMMARY