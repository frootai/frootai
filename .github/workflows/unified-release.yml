name: Unified Release

on:
  push:
    tags:
      - 'rel-v*'
  workflow_dispatch:
    inputs:
      channels:
        description: 'Channels to release (comma-separated: mcp,ext,sdk,pymcp,docker,all)'
        required: true
        default: 'all'
        type: string
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Step 1: Run factory pipeline to ensure everything is in sync
  factory:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - name: Run FAI Factory
        run: |
          node scripts/factory/harvest.js
          node scripts/factory/catalog.js
          node scripts/factory/transform.js
          node scripts/factory/validate.js

      - name: Upload catalog
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-catalog
          path: .factory/fai-catalog.json

  # Step 2: Publish npm MCP server
  publish-mcp:
    needs: factory
    if: contains(github.event.inputs.channels || 'all', 'mcp') || contains(github.event.inputs.channels || 'all', 'all') || startsWith(github.ref, 'refs/tags/rel-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish MCP Server
        working-directory: npm-mcp
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Step 3: Publish VS Code extension
  publish-ext:
    needs: factory
    if: contains(github.event.inputs.channels || 'all', 'ext') || contains(github.event.inputs.channels || 'all', 'all') || startsWith(github.ref, 'refs/tags/rel-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Publish Extension
        working-directory: vscode-extension
        run: |
          npm ci
          vsce publish --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  # Step 4: Publish Python packages
  publish-python:
    needs: factory
    if: contains(github.event.inputs.channels || 'all', 'pymcp') || contains(github.event.inputs.channels || 'all', 'sdk') || contains(github.event.inputs.channels || 'all', 'all') || startsWith(github.ref, 'refs/tags/rel-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build twine

      - name: Build & publish Python MCP
        working-directory: python-mcp
        run: |
          python -m build
          twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

      - name: Build & publish Python SDK
        working-directory: python-sdk
        run: |
          python -m build
          twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_SDK_TOKEN }}

  # Step 5: Build & push Docker image
  publish-docker:
    needs: factory
    if: contains(github.event.inputs.channels || 'all', 'docker') || contains(github.event.inputs.channels || 'all', 'all') || startsWith(github.ref, 'refs/tags/rel-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#rel-v}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: .
          push: true
          tags: |
            ghcr.io/frootai/mcp-server:${{ steps.version.outputs.version }}
            ghcr.io/frootai/mcp-server:latest

  # Step 6: Trigger website rebuild
  notify-website:
    needs: [publish-mcp, publish-ext, publish-python, publish-docker]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Trigger website rebuild
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          github-token: ${{ secrets.CROSS_REPO_TOKEN }}
          script: |
            try {
              await github.rest.repos.createDispatchEvent({
                owner: 'frootai',
                repo: 'frootai.dev',
                event_type: 'factory-update',
                client_payload: { commit: context.sha, message: 'Unified release' },
              });
            } catch (err) {
              console.log('Cross-repo dispatch skipped:', err.message);
            }
