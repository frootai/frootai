name: Uptime Monitor

on:
  schedule:
    # Run every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check frootai.dev
        id: website
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "https://frootai.dev")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          if [ "$STATUS" != "200" ]; then
            echo "❌ frootai.dev returned $STATUS"
            exit 1
          fi
          echo "✅ frootai.dev is up ($STATUS)"

      - name: Check chatbot API
        id: chatbot
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "https://frootai-chatbot-api.azurewebsites.net/")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "302" ]; then
            echo "❌ Chatbot API returned $STATUS"
            exit 1
          fi
          echo "✅ Chatbot API is up ($STATUS)"

      - name: Check npm package
        id: npm
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "https://registry.npmjs.org/frootai-mcp/latest")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          if [ "$STATUS" != "200" ]; then
            echo "❌ npm registry returned $STATUS"
            exit 1
          fi
          echo "✅ npm package is reachable ($STATUS)"

      - name: Create issue on failure
        if: steps.website.outcome == 'failure' || steps.chatbot.outcome == 'failure'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const website = '${{ steps.website.outputs.status }}';
            const chatbot = '${{ steps.chatbot.outputs.status }}';
            const npm_status = '${{ steps.npm.outputs.status }}';

            let body = '## 🚨 Uptime Alert\n\n';
            body += `| Service | Status |\n|---------|--------|\n`;
            body += `| frootai.dev | ${website === '200' ? '✅ Up' : '❌ Down (' + website + ')'} |\n`;
            body += `| Chatbot API | ${['200','302'].includes(chatbot) ? '✅ Up' : '❌ Down (' + chatbot + ')'} |\n`;
            body += `| npm Registry | ${npm_status === '200' ? '✅ Up' : '⚠️ Issue (' + npm_status + ')'} |\n`;
            body += `\n_Auto-generated by uptime monitor at ${new Date().toISOString()}_`;

            // Check for existing open downtime issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'downtime',
              state: 'open',
            });

            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🚨 Service downtime detected',
                body,
                labels: ['downtime', 'automated'],
              });
            }

      - name: Summary
        if: always()
        run: |
          echo "## Uptime Check" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| frootai.dev | ${{ steps.website.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Chatbot API | ${{ steps.chatbot.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| npm Registry | ${{ steps.npm.outcome }} |" >> $GITHUB_STEP_SUMMARY
