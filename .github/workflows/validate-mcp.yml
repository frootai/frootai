name: Validate MCP Server

on:
  push:
    branches: [main]
    paths:
      - 'npm-mcp/**'
      - 'docs/**'
  pull_request:
    paths:
      - 'npm-mcp/**'
      - 'docs/**'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: npm-mcp/package-lock.json

      - name: Install MCP server dependencies
        working-directory: npm-mcp
        run: npm ci

      - name: Verify knowledge base
        working-directory: npm-mcp
        run: |
          echo "=== FrootAI MCP Server Verification ==="
          node -e "
            const fs = require('fs');
            const kb = JSON.parse(fs.readFileSync('knowledge.json', 'utf-8'));
            const count = Object.keys(kb.modules).length;
            const size = (Buffer.byteLength(fs.readFileSync('knowledge.json')) / 1024).toFixed(0);
            console.log('  Knowledge base: ' + count + ' modules bundled');
            console.log('  Bundle size: ' + size + ' KB');
            if (count < 10) { console.error('ERROR: Expected 10+ modules'); process.exit(1); }
            console.log('✅ MCP server verified');
          "

      - name: Verify tool count
        working-directory: npm-mcp
        run: |
          TOOLS=$(grep -c '"name":' index.js || echo "0")
          echo "✅ Tools registered: $TOOLS"

      - name: Summary
        if: always()
        run: |
          echo "## MCP Server Validation" >> $GITHUB_STEP_SUMMARY
          echo "✅ Knowledge base and tool count verified" >> $GITHUB_STEP_SUMMARY
