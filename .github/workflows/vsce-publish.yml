name: Publish VS Code Extension

on:
  push:
    tags:
      - 'ext-v*'    # Channel-specific: ext-v5.0.2
      - 'rel-v*'    # Unified release: triggers ALL channels
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # On tag push: always run. On branch push: only if vscode-extension changed.
    # Always run on tag push or manual dispatch
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Check if version is newer than marketplace
        id: version_check
        working-directory: vscode-extension
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          MARKETPLACE=$(npx @vscode/vsce show frootai.frootai-vscode --json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).versions[0].version" 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL" >> $GITHUB_OUTPUT
          echo "marketplace=$MARKETPLACE" >> $GITHUB_OUTPUT
          if [ "$LOCAL" = "$MARKETPLACE" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version $LOCAL already published — skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Publishing frootai extension v$LOCAL (marketplace has $MARKETPLACE)"
          fi

      - name: Package and Publish
        if: steps.version_check.outputs.skip != 'true'
        working-directory: vscode-extension
        run: |
          vsce package
          vsce publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Summary
        if: always()
        run: |
          echo "## VS Code Extension Publish" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ steps.version_check.outputs.local }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Marketplace | ${{ steps.version_check.outputs.marketplace }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Skipped | ${{ steps.version_check.outputs.skip }} |" >> $GITHUB_STEP_SUMMARY
