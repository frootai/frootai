name: Weekly Factory Audit

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 8:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - name: Run FAI Factory Pipeline
        run: |
          node scripts/factory/harvest.js
          node scripts/factory/catalog.js
          node scripts/factory/validate.js 2>&1 | tee .factory/audit-output.txt
        continue-on-error: true

      - name: Check for issues
        id: check
        run: |
          if grep -q "❌\|FAIL\|ERROR" .factory/audit-output.txt 2>/dev/null; then
            echo "has_issues=true" >> $GITHUB_OUTPUT
          else
            echo "has_issues=false" >> $GITHUB_OUTPUT
          fi

      - name: Create issue on failure
        if: steps.check.outputs.has_issues == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('.factory/audit-output.txt', 'utf8');

            // Close previous audit issues
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'factory-audit',
            });
            for (const issue of issues) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'not_planned',
              });
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🏭 Factory Audit: Consistency issues detected (${new Date().toISOString().split('T')[0]})`,
              labels: ['factory-audit', 'automated'],
              body: `## Weekly Factory Audit Report

            The FAI Factory pipeline detected consistency issues:

            \`\`\`
            ${output.substring(0, 60000)}
            \`\`\`

            ### Next Steps
            1. Review the errors above
            2. Run \`npm run factory\` locally to reproduce
            3. Fix the issues and push

            *Generated by Weekly Factory Audit workflow*`,
            });
