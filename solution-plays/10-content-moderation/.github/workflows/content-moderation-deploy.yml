# AI-Powered Deployment Workflow
# Layer 3 — Agentic Workflow. Compiles to GitHub Actions for automated Azure deployment.

name: AI Deploy
on:
  push:
    branches: [main]
    paths: ['solution-plays/10-content-moderation/infra/**']

permissions:
  contents: read
  id-token: write  # For Azure OIDC auth

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # environment: staging  # Configure in your repo Settings > Environments
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Azure Login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep
        run: az bicep build --file solution-plays/10-content-moderation/infra/main.bicep

      - name: Deploy to Staging
        run: |
          az deployment group create \
            --resource-group rg-enterprise-rag-staging \
            --template-file solution-plays/10-content-moderation/infra/main.bicep \
            --parameters solution-plays/10-content-moderation/infra/parameters.json

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # environment: production  # Configure in your repo Settings > Environments
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Azure Login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Production
        run: |
          az deployment group create \
            --resource-group rg-enterprise-rag \
            --template-file solution-plays/10-content-moderation/infra/main.bicep \
            --parameters solution-plays/10-content-moderation/infra/parameters.json