# AI-Powered Deployment Workflow — Ai Compliance Engine
# Layer 3 — Agentic Workflow. Compiles to GitHub Actions for automated Azure deployment.

name: AI Deploy — Ai Compliance Engine
on:
  push:
    branches: [main]
    paths: ['solution-plays/35-ai-compliance-engine/infra/**']

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Bicep
        run: az bicep build --file solution-plays/35-ai-compliance-engine/infra/main.bicep
      - name: Validate Configs
        run: |
          for f in solution-plays/35-ai-compliance-engine/config/*.json; do
            python3 -c "import json; json.load(open('$f'))"
          done

  deploy-staging:
    needs: validate
    runs-on: ubuntu-latest
    # environment: staging  # Configure in your repo Settings > Environments
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy to Staging
        run: |
          az deployment group create \
            --resource-group rg-ai-compliance-engine-staging \
            --template-file solution-plays/35-ai-compliance-engine/infra/main.bicep \
            --parameters solution-plays/35-ai-compliance-engine/infra/parameters.json

  evaluate:
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install azure-ai-evaluation openai
      - name: Run Evaluation
        run: python solution-plays/35-ai-compliance-engine/evaluation/eval.py
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}

  deploy-production:
    needs: evaluate
    runs-on: ubuntu-latest
    # environment: production  # Configure in your repo Settings > Environments
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy to Production
        run: |
          az deployment group create \
            --resource-group rg-ai-compliance-engine \
            --template-file solution-plays/35-ai-compliance-engine/infra/main.bicep \
            --parameters solution-plays/35-ai-compliance-engine/infra/parameters.json \
            --parameters environment=prod