# AI-Powered Code Review Workflow — Document Understanding V2
# Layer 3 — Agentic Workflow. Runs automated review on PRs targeting this play.

name: AI Review — Document Understanding V2
on:
  pull_request:
    paths: ['solution-plays/38-document-understanding-v2/**']

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check JSON validity
        run: |
          for f in $(find solution-plays/38-document-understanding-v2 -name "*.json" -type f); do
            python3 -c "import json; json.load(open('$f'))" || echo "INVALID: $f"
          done

      - name: Check for secrets
        run: |
          if grep -rl "sk-[a-zA-Z0-9]\{20,\}" solution-plays/38-document-understanding-v2/ 2>/dev/null; then
            echo "::error::Hardcoded API keys detected!"
            exit 1
          fi

      - name: Validate Bicep
        run: az bicep build --file solution-plays/38-document-understanding-v2/infra/main.bicep

      - name: Check guardrails
        run: |
          python3 -c "
          import json
          g = json.load(open('solution-plays/38-document-understanding-v2/config/guardrails.json'))
          assert g.get('content_safety',{}).get('enabled'), 'Content safety must be enabled'
          assert g.get('pii_detection',{}).get('enabled'), 'PII detection must be enabled'
          print('✓ Guardrails validated')
          "
