# AI-Powered Code Review Workflow — Construction Safety Ai
# Layer 3 — Agentic Workflow. Runs automated review on PRs targeting this play.

name: AI Review — Construction Safety Ai
on:
  pull_request:
    paths: ['solution-plays/82-construction-safety-ai/**']

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check JSON validity
        run: |
          for f in $(find solution-plays/82-construction-safety-ai -name "*.json" -type f); do
            python3 -c "import json; json.load(open('$f'))" || echo "INVALID: $f"
          done

      - name: Check for secrets
        run: |
          if grep -rl "sk-[a-zA-Z0-9]\{20,\}" solution-plays/82-construction-safety-ai/ 2>/dev/null; then
            echo "::error::Hardcoded API keys detected!"
            exit 1
          fi

      - name: Validate Bicep
        run: az bicep build --file solution-plays/82-construction-safety-ai/infra/main.bicep

      - name: Check guardrails
        run: |
          python3 -c "
          import json
          g = json.load(open('solution-plays/82-construction-safety-ai/config/guardrails.json'))
          assert g.get('content_safety',{}).get('enabled'), 'Content safety must be enabled'
          assert g.get('pii_detection',{}).get('enabled'), 'PII detection must be enabled'
          print('✓ Guardrails validated')
          "
